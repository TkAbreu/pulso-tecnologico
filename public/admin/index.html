<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Painel CMS | Pulso Tecnológico</title>
    <style>
      /* Loading screen */
      #cms-loading {
        position: fixed;
        inset: 0;
        background: #0a1a16;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #cms-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #cms-loading .logo {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 2rem;
        font-style: italic;
        color: #00c896;
        letter-spacing: -0.5px;
      }
      #cms-loading .logo span {
        font-family: system-ui, -apple-system, sans-serif;
        font-style: normal;
        color: #e8f4f0;
        font-size: 1.1rem;
        display: block;
        text-align: center;
        margin-top: 0.25rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 400;
        opacity: 0.7;
      }
      #cms-loading .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #0f2420;
        border-top-color: #00c896;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Override Sveltia CMS theme to match blog */
      :root {
        --color-accent: #00c896 !important;
        --color-accent-light: #00e5a0 !important;
        --color-background: #0a1a16 !important;
        --color-surface: #0f2420 !important;
      }
    </style>
  </head>
  <body>
    <div id="cms-loading">
      <div class="logo">
        Pulso
        <span>Painel de Administração</span>
      </div>
      <div class="spinner"></div>
    </div>

    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var loading = document.getElementById('cms-loading');
        // Hide loading screen once CMS initializes
        setTimeout(function () {
          loading.classList.add('hidden');
          setTimeout(function () { loading.remove(); }, 400);
        }, 1800);
      });
    </script>
  </body>
</html>
